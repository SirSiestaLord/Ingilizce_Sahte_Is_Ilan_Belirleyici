<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İngilizce İş İlanı Doğrulama Sistemi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .result-box { padding: 20px; border-radius: 10px; margin-top: 20px; font-weight: bold; text-align: center; }
        .fake { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .real { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h2 class="mb-0">Yapay Zeka Destekli İngilizce İş İlanı Analizi</h2>
                    </div>
                    <div class="card-body p-4">
                        <form action="/predict" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">İş İlanı Metnini (Başlık, Açıklama ve Gereksinimler) Girin:</label>
                                <textarea class="form-control" name="job_text" rows="8" placeholder="İlan detaylarını buraya yapıştırın..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">İLANI ANALİZ ET</button>
                        </form>

                        {% if prediction %}
                        <div class="result-box {% if 'SAHTE' in prediction %}fake{% else %}real{% endif %}">
                            <h4>Analiz Sonucu: {{ prediction }}</h4>
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
